roleId: product-manager
category: development
version: "1.0.0"

# 基本信息
basicInfo:
  title: 产品经理
  englishTitle: Product Manager
  level: individual-contributor
  reportTo: product-director
  
  description: |
    负责产品的规划、设计和全生命周期管理。
    连接用户需求、商业目标和技术实现，确保产品成功交付。

# 能力模型
competencies:
  core:
    - name: 需求分析
      level: expert
      keywords: [用户调研，竞品分析，需求优先级，用户故事]
    
    - name: 产品设计
      level: advanced
      keywords: [原型设计，流程图，信息架构，交互设计]
    
    - name: 文档撰写
      level: expert
      keywords: [PRD, MRD, BRD, 用户故事地图]
    
    - name: 数据分析
      level: intermediate
      keywords: [数据驱动，A/B 测试，漏斗分析，指标定义]
  
  specialized:
    - name: 技术理解
      level: intermediate
      keywords: [系统架构，API 设计，数据库基础]
      optional: true
    
    - name: 项目管理
      level: intermediate
      keywords: [敏捷开发，Sprint 规划，风险管理]
  
  soft:
    - name: 沟通协调
      level: required
      description: "能在多方利益相关者之间有效沟通和协调"
    
    - name: 决策能力
      level: required
      description: "基于数据和直觉做出产品决策"
    
    - name: 同理心
      level: required
      description: "深刻理解用户需求和痛点"

# 典型职责
responsibilities:
  routine:
    - "收集和整理用户需求"
    - "编写和维护 PRD 文档"
    - "设计产品原型和流程图"
    - "参与需求评审和技术评审"
    - "验收开发成果"
  
  project-based:
    - "制定产品 roadmap"
    - "进行市场调研和竞品分析"
    - "定义产品指标和成功标准"
    - "组织用户调研和可用性测试"
    - "推动产品上线和迭代优化"

# 协作边界
boundaries:
  collaboratesWith:
    - role: stakeholders
      interaction: frequent
      touchpoints:
        - "需求收集会议"
        - "产品演示会"
        - "阶段性汇报"
      handoffs:
        - from: stakeholders
          item: "业务需求和目标"
        - to: stakeholders
          item: "产品方案和进度报告"
    
    - role: ui-ux-designer
      interaction: frequent
      touchpoints:
        - "设计需求说明"
        - "设计方案评审"
      handoffs:
        - from: product-manager
          item: "PRD 和原型"
        - to: product-manager
          item: "设计稿确认"
    
    - role: frontend-dev
      interaction: regular
      touchpoints:
        - "需求评审"
        - "功能验收"
      handoffs:
        - from: product-manager
          item: "PRD 文档"
        - to: product-manager
          item: "可演示功能"
    
    - role: backend-dev
      interaction: regular
      touchpoints:
        - "技术方案评审"
        - "API 设计讨论"
      handoffs:
        - from: product-manager
          item: "业务逻辑说明"
        - to: product-manager
          item: "API 文档"
    
    - role: qa-engineer
      interaction: regular
      touchpoints:
        - "测试用例评审"
        - "Bug 优先级确认"
      handoffs:
        - from: qa-engineer
          item: "测试报告"
        - to: qa-engineer
          item: "验收标准"
  
  notResponsibleFor:
    - "具体代码实现（开发职责）"
    - "视觉设计细节（设计职责）"
    - "测试用例编写和执行（测试职责）"
    - "服务器运维（运维职责）"
  
  grayAreas:
    - topic: "UI 细节调整"
      sharedWith: ui-ux-designer
      note: "产品关注功能和流程，设计关注视觉和体验"
    
    - topic: "技术方案选择"
      sharedWith: backend-dev
      note: "产品提出需求，技术评估可行性和方案"

# 最佳实践
bestPractices:
  requirements:
    - "使用用户故事格式：作为 [用户]，我想要 [功能]，以便于 [价值]"
    - "每个需求都要有明确的验收标准"
    - "优先级的 MoSCoW 法则：Must/Should/Could/Won't"
    - "需求变更要及时同步并评估影响"
  
  documentation:
    - "PRD 结构清晰：背景、目标、功能、流程、异常处理"
    - "多用图表：流程图、时序图、状态图"
    - "版本管理：记录每次变更的原因和内容"
    - "保持文档更新，避免过期信息"
  
  collaboration:
    - "尽早让开发和测试参与需求讨论"
    - "定期同步产品进展和用户反馈"
    - "接受合理的技术约束和建议"
    - "及时验收和反馈，不阻塞开发进度"

# 工作量估算基准
estimationBaseline:
  unit: hours
  
  tasks:
    - taskType: "简单功能 PRD"
      description: "单一功能模块，逻辑清晰"
      range: [8, 16]
      factors: ["需求复杂度", "依赖系统数量"]
    
    - taskType: "复杂功能 PRD"
      description: "多模块协作，业务流程复杂"
      range: [40, 80]
      factors: ["业务复杂度", "干系人数量", "技术风险"]
    
    - taskType: "用户调研"
      description: "访谈、问卷、可用性测试"
      range: [20, 60]
      factors: ["样本数量", "调研深度"]
    
    - taskType: "竞品分析"
      description: "功能对比、优劣势分析"
      range: [16, 40]
      factors: ["竞品数量", "分析维度"]
  
  multipliers:
    urgent: 1.2
    unclear: 1.5
    multiple-stakeholders: 1.3
    new-domain: 1.4

# PRD 模板参考
prdTemplate: |
  # 产品需求文档 (PRD)
  
  ## 1. 文档信息
  - 产品名称：
  - 版本号：
  - 撰写人：
  - 最后更新：
  
  ## 2. 背景与目标
  ### 2.1 背景
  为什么要做这个功能？解决什么问题？
  
  ### 2.2 目标
  期望达成什么业务目标？如何衡量成功？
  
  ## 3. 用户群体
  ### 3.1 目标用户
  谁会使用这个功能？
  
  ### 3.2 用户场景
  用户在什么情况下会使用？
  
  ## 4. 功能需求
  ### 4.1 功能列表
  | 功能点 | 描述 | 优先级 |
  |-------|------|--------|
  |       |      | P0     |
  
  ### 4.2 详细需求
  #### 4.2.1 功能名称
  - 用户故事：作为...我想要...以便于...
  - 功能描述：
  - 业务流程：（流程图）
  - 界面原型：（原型图）
  - 异常处理：
  
  ## 5. 非功能需求
  ### 5.1 性能要求
  ### 5.2 安全要求
  ### 5.3 兼容性要求
  
  ## 6. 数据需求
  ### 6.1 数据埋点
  ### 6.2 统计指标
  
  ## 7. 运营需求
  ### 7.1 上线计划
  ### 7.2 推广策略
  
  ## 8. 附录
  ### 8.1 术语解释
  ### 8.2 参考资料

# 成长路径
growthPath:
  levels:
    - level: junior
      title: 初级产品经理
      experience: "0-2 年"
      focus: ["执行单一功能", "文档撰写", "基础分析"]
    
    - level: mid
      title: 中级产品经理
      experience: "2-4 年"
      focus: ["独立负责模块", "跨团队协作", "数据驱动"]
    
    - level: senior
      title: 高级产品经理
      experience: "4-6 年"
      focus: ["产品线规划", "策略制定", "商业敏感"]
    
    - level: expert
      title: 产品专家/总监
      experience: "6+ 年"
      focus: ["产品战略", "组织建设", "行业影响力"]

# 风险评估
risks:
  - type: requirement-churn
    description: "需求频繁变更"
    indicators:
      - "一周内多次修改 PRD"
      - "开发过程中不断加需求"
    mitigation: "需求评审时充分讨论，变更走正式流程"
  
  - type: stakeholder-conflict
    description: "干系人意见不一致"
    indicators:
      - "多方提出矛盾需求"
      - "决策迟迟无法达成"
    mitigation: "组织对齐会议，基于数据和目标决策"
  
  - type: over-design
    description: "过度设计，追求完美"
    indicators:
      - "PRD 写了很久还没定稿"
      - "考虑过多极端情况"
    mitigation: "MVP 思维，先解决核心问题，快速迭代"
