roleId: backend-dev
category: development
version: "1.0.0"

basicInfo:
  title: 后端工程师
  englishTitle: Backend Engineer
  level: individual-contributor
  reportTo: tech-lead
  
  description: |
    负责服务器端业务逻辑、数据库设计和 API 开发。
    关注系统性能、安全性和可扩展性，支撑前端业务需求。

competencies:
  core:
    - name: 编程语言
      level: expert
      keywords: [Java, Python, Go, Node.js, 至少精通一门]
    
    - name: 数据库
      level: advanced
      keywords: [MySQL, PostgreSQL, MongoDB, Redis, SQL 优化]
    
    - name: API 设计
      level: advanced
      keywords: [RESTful, GraphQL, gRPC, OpenAPI, 版本管理]
    
    - name: 系统设计
      level: advanced
      keywords: [微服务，分布式，缓存策略，消息队列]
  
  specialized:
    - name: 云原生
      level: intermediate
      keywords: [Docker, Kubernetes, Serverless, 云服务]
      optional: true
    
    - name: 大数据
      level: basic
      keywords: [Elasticsearch, Kafka, Spark, 数据处理]
      optional: true
    
    - name: 安全
      level: intermediate
      keywords: [认证授权，加密，防攻击，数据隐私]
  
  soft:
    - name: 逻辑思维
      level: required
      description: "强大的逻辑分析和问题解决能力"
    
    - name: 沟通能力
      level: required
      description: "能与产品、前端高效协作"

responsibilities:
  routine:
    - "业务逻辑开发和代码实现"
    - "数据库设计和 SQL 编写"
    - "API 接口开发和文档维护"
    - "Code Review 和技术分享"
    - "线上问题排查和修复"
  
  project-based:
    - "系统架构设计和技术选型"
    - "性能优化和容量规划"
    - "技术债务清理和重构"
    - "新技术调研和 PoC"
    - "制定开发规范和最佳实践"

boundaries:
  collaboratesWith:
    - role: product-manager
      interaction: frequent
      touchpoints:
        - "需求评审"
        - "技术方案讨论"
      handoffs:
        - from: product-manager
          item: "PRD 和业务逻辑说明"
        - to: product-manager
          item: "技术可行性评估"
    
    - role: frontend-dev
      interaction: daily
      touchpoints:
        - "API 接口定义"
        - "联调测试"
      handoffs:
        - from: backend-dev
          item: "API 文档和接口"
          format: "Swagger/YApi"
        - mutual: "接口契约"
          format: "OpenAPI Specification"
    
    - role: devops-engineer
      interaction: regular
      touchpoints:
        - "部署流程设计"
        - "监控告警配置"
      handoffs:
        - from: devops-engineer
          item: "CI/CD 流水线"
        - to: devops-engineer
          item: "部署文档和脚本"
  
  notResponsibleFor:
    - "UI 界面实现（前端职责）"
    - "业务决策（产品职责）"
    - "视觉设计（设计职责）"
  
  grayAreas:
    - topic: "数据结构设计"
      sharedWith: product-manager
      note: "后端设计技术结构，产品定义业务字段"
    
    - topic: "接口格式"
      sharedWith: frontend-dev
      note: "共同协商，优先满足使用场景"

bestPractices:
  codeQuality:
    - "遵循编码规范和设计模式"
    - "写可测试的代码，保持高内聚低耦合"
    - "及时处理异常，不吞错误"
    - "代码注释解释 Why 而非 What"
  
  database:
    - "合理设计索引，避免慢查询"
    - "使用事务保证数据一致性"
    - "敏感数据加密存储"
    - "定期备份和数据恢复演练"
  
  api:
    - "遵循 RESTful 规范"
    - "完善的错误码和错误信息"
    - "接口版本管理"
    - "限流和降级策略"
  
  security:
    - "输入验证，防止注入攻击"
    - "身份认证和权限校验"
    - "敏感操作日志记录"
    - "定期安全扫描和漏洞修复"

estimationBaseline:
  unit: hours
  
  tasks:
    - taskType: "简单 API 开发"
      description: "CRUD 操作，单表查询"
      range: [4, 12]
      factors: ["字段数量", "验证逻辑"]
    
    - taskType: "中等业务模块"
      description: "多表关联，业务逻辑复杂"
      range: [20, 60]
      factors: ["业务复杂度", "集成系统数量"]
    
    - taskType: "复杂系统设计"
      description: "分布式、高并发场景"
      range: [80, 200]
      factors: ["系统复杂度", "性能要求", "可用性要求"]
    
    - taskType: "数据库设计"
      description: "表结构设计、索引优化"
      range: [8, 40]
      factors: ["数据量", "查询模式", "扩展性要求"]
  
  multipliers:
    urgent: 1.3
    legacy-system: 1.5
    high-concurrency: 1.4
    data-migration: 1.3

growthPath:
  levels:
    - level: junior
      title: 初级后端工程师
      experience: "0-2 年"
      focus: ["基础编码", "理解业务", "代码规范"]
    
    - level: mid
      title: 中级后端工程师
      experience: "2-4 年"
      focus: ["模块设计", "性能优化", "独立负责"]
    
    - level: senior
      title: 高级后端工程师
      experience: "4-6 年"
      focus: ["系统架构", "技术选型", "带团队"]
    
    - level: expert
      title: "后端专家/架构师"
      experience: "6+ 年"
      focus: ["技术规划", "体系建设", "影响力"]

risks:
  - type: single-point-failure
    description: "单点故障风险"
    mitigation: "关键服务冗余部署，定期轮岗"
  
  - type: tech-debt
    description: "技术债务积累"
    indicators:
      - "Bug 重复出现"
      - "新功能开发缓慢"
    mitigation: "定期重构，保持测试覆盖"
